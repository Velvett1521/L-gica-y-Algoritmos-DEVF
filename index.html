<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planificador de Viajes Pro</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .formulario {
            background: white;
            border-radius: 10px;
            padding: 25px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
            font-weight: bold;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        
        .form-group input:focus, .form-group select:focus {
            border-color: #667eea;
            outline: none;
        }
        
        .btn-registrar {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s;
        }
        
        .btn-registrar:hover {
            transform: translateY(-2px);
        }
        
        .itinerario {
            background: white;
            border-radius: 10px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        
        .itinerario h2 {
            color: #333;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }
        
        #lista-viajes {
            margin-bottom: 20px;
        }
        
        .viaje {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
            position: relative;
            border-left: 4px solid #667eea;
        }
        
        .destino-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }
        
        .destino {
            color: #2c3e50;
            font-size: 1.3em;
            font-weight: bold;
        }
        
        .btn-eliminar {
            background: #ff4757;
            color: white;
            border: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            transition: background 0.3s;
        }
        
        .btn-eliminar:hover {
            background: #ff6b81;
        }
        
        .detalle {
            color: #666;
            margin: 5px 0;
        }
        
        .descuento {
            color: #ff6b6b;
            font-weight: bold;
            margin: 5px 0;
        }
        
        .costo {
            color: #27ae60;
            font-weight: bold;
            font-size: 1.2em;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #ddd;
        }
        
        .total {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 8px;
            text-align: center;
            font-size: 1.3em;
            margin: 20px 0;
        }
        
        .estadisticas {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 10px;
        }
        
        .stat {
            background: white;
            padding: 10px;
            border-radius: 5px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        
        .mensaje {
            text-align: center;
            color: #888;
            font-style: italic;
            padding: 30px;
        }
        
        .info-row {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <h1>Planificador de Viajes Pro</h1>
    
    <div class="formulario">
        <h2>Registrar Nuevo Viaje</h2>
        <div class="form-group">
            <label for="destino">Destino:</label>
            <select id="destino">
                <option value="">Selecciona un destino</option>
                <option value="Paris">Paris ($500)</option>
                <option value="Londres">Londres ($400)</option>
                <option value="New_York">New York ($600)</option>
                <option value="Tokyo">Tokyo ($800)</option>
                <option value="Roma">Roma ($450)</option>
                <option value="Cancun">Cancún ($300)</option>
                <option value="Madrid">Madrid ($550)</option>
                <option value="Amsterdam">Amsterdam ($480)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="fecha">Fecha:</label>
            <input type="date" id="fecha">
        </div>
        
        <div class="form-group">
            <label for="transporte">Transporte:</label>
            <select id="transporte">
                <option value="Avion">Avión (+$200)</option>
                <option value="Tren">Tren (+$100)</option>
                <option value="Autobus">Autobús (+$50)</option>
                <option value="Barco">Barco (+$150)</option>
                <option value="Coche">Coche (+$80)</option>
            </select>
        </div>
        
        <div class="form-group">
            <label for="personas">Número de personas:</label>
            <input type="number" id="personas" min="1" value="1">
            <small style="color: #666;">(5+ personas: 10% descuento | 9+ personas: 15% descuento | 13+ personas: 20% descuento)</small>
        </div>
        
        <button class="btn-registrar" onclick="registrar_viaje_desde_form()">Registrar Viaje ✈️</button>
    </div>
    
    <div class="itinerario">
        <h2>📋 Itinerario de Viajes</h2>
        <div id="lista-viajes">
            Cargando viajes...
        </div>
        <div id="total" class="total"></div>
        <div id="estadisticas" class="estadisticas"></div>
    </div>

    <script type="module" src="app.js"></script>
</body>
</html>
